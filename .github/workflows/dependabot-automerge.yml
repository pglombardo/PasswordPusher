name: Dependabot auto-merge

# Runs after "Ruby Test Runs" completes. No branches filter: for PR-triggered
# runs the "branch" is the PR head (e.g. dependabot/bundler/...), not master.
on:
  workflow_run:
    workflows: ["Ruby Test Runs"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    # Only when the test workflow succeeded and was for a PR
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Get PR number for this run
        id: pr
        run: |
          PR_NUM=$(gh pr list --head "${{ github.event.workflow_run.head_branch }}" --repo "${{ github.repository }}" --json number -q '.[0].number')
          echo "number=$PR_NUM" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for Dependabot PR (squash)
        if: steps.pr.outputs.number != ''
        run: |
          AUTHOR=$(gh pr view ${{ steps.pr.outputs.number }} --json author,baseRefName -q '.author.login + " " + .baseRefName')
          read -r AUTHOR BASE_REF <<< "$AUTHOR"
          if [ "$AUTHOR" = "dependabot[bot]" ] && [ "$BASE_REF" = "master" ]; then
            gh pr merge ${{ steps.pr.outputs.number }} --auto --squash
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
