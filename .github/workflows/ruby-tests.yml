name: Ruby Test Runs

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.4']

    env:
      BUNDLE_WITHOUT: 'development'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Get yarn cache
        id: yarn-cache
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache yarn
        uses: actions/cache@v5
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache gems
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gem-v1-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gem-v1-

      - name: Install dependencies
        run: |
          gem install bundler
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3
          yarn install --frozen-lockfile

      # Pin Chrome for system tests: newer Chrome + headless has caused Capybara to treat
      # Bootstrap modals and other UI as non-visible while still in the DOM, and flaky
      # visit()/path behavior. See https://github.com/teamcapybara/capybara/issues/2800
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: "133"
          install-chromedriver: true

      - name: Prepare tests
        run: |
          yarn build:css:single
          bin/rails assets:precompile RAILS_ENV=test
          bin/rails db:migrate RAILS_ENV=test

      - name: Run tests
        run: |
          bin/rails test

      - name: Run system tests
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          # Selenium 4 reads this for ChromeDriver (see selenium-webdriver Chrome::Service)
          SE_CHROMEDRIVER: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          bin/rails test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
          compression-level: 0

      - name: Post job failure details to Campfire
        if: failure() && github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: shane-lamb/campfire-notify-action@v1.1.6
        with:
          messages_url: ${{ secrets.CAMPFIRE_MESSAGES_URL }}
          template: job_failed
