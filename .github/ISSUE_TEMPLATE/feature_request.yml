name: 🚀 Feature request
description: Suggest an idea for this project 🏖
title: "[Feature Request]: "
labels:
  - feature

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Feature Request
        Thanks for taking the time to suggest an improvement!  
        The more detail you can share, the easier it is for us to evaluate and prioritise.

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: A clear and concise description of the feature proposal.
      placeholder: Describe the feature and what problem it solves.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 🔈 Motivation
      description: Please describe the motivation for this proposal.
      placeholder: Why is this important? What workflow or outcome does it improve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🛰 Alternatives considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: What other approaches have you tried or considered? Why are they not ideal?
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 📎 Additional context
      description: Add any other context, links, or screenshots about the request here.
      placeholder: Include mockups, screenshots, or related issues/PRs if you have them.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: ✅ Checklist
      description: Help us process this request faster by confirming the following.
      options:
        - label: I searched existing issues to make sure this hasn’t already been requested.
          required: true
        - label: This request describes a single feature (not multiple unrelated items).
          required: false
